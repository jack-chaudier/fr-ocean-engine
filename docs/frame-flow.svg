<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e172a"/>
    </linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a44"/>
      <stop offset="100%" stop-color="#0a1f33"/>
    </linearGradient>
    <linearGradient id="stepEnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c3a30"/>
      <stop offset="100%" stop-color="#083024"/>
    </linearGradient>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .ftitle { fill:#f8fafc; font-size:20px; font-weight:600; letter-spacing:-0.3px; }
      .fsub   { fill:#94a3b8; font-size:12px; }
      .step   { fill:url(#step);   stroke:#38bdf8; stroke-width:1.2; }
      .stepEnd{ fill:url(#stepEnd); stroke:#34d399; stroke-width:1.2; }
      .lbl    { fill:#f1f5f9; font-size:14px; font-weight:600; }
      .det    { fill:#cbd5e1; font-size:11px; }
      .ln     { stroke:#64748b; stroke-width:1.3; fill:none; }
    </style>
  </defs>

  <rect width="1000" height="260" fill="url(#fbg)"/>

  <text x="40" y="40" class="ftitle">Per-frame pipeline</text>
  <text x="40" y="60" class="fsub">Input → Time → Schedulers → Scene lifecycle → Render</text>

  <g>
    <rect x="30"  y="90" width="140" height="100" rx="10" class="step"/>
    <text x="100" y="125" text-anchor="middle" class="lbl">Input</text>
    <text x="100" y="145" text-anchor="middle" class="det">BeginFrame</text>
    <text x="100" y="160" text-anchor="middle" class="det">SDL event poll</text>
    <text x="100" y="175" text-anchor="middle" class="det">F1 toggles debug</text>
  </g>
  <g>
    <rect x="190" y="90" width="140" height="100" rx="10" class="step"/>
    <text x="260" y="125" text-anchor="middle" class="lbl">Time</text>
    <text x="260" y="145" text-anchor="middle" class="det">dt · totalTime</text>
    <text x="260" y="160" text-anchor="middle" class="det">timeScale</text>
    <text x="260" y="175" text-anchor="middle" class="det">frameCount</text>
  </g>
  <g>
    <rect x="350" y="90" width="160" height="100" rx="10" class="step"/>
    <text x="430" y="125" text-anchor="middle" class="lbl">Schedulers</text>
    <text x="430" y="145" text-anchor="middle" class="det">Tween · Timer</text>
    <text x="430" y="160" text-anchor="middle" class="det">Animation · Particles</text>
    <text x="430" y="175" text-anchor="middle" class="det">Transition · Camera</text>
  </g>
  <g>
    <rect x="530" y="90" width="200" height="100" rx="10" class="step"/>
    <text x="630" y="125" text-anchor="middle" class="lbl">Scene lifecycle</text>
    <text x="630" y="145" text-anchor="middle" class="det">OnStart → OnUpdate</text>
    <text x="630" y="160" text-anchor="middle" class="det">physics step</text>
    <text x="630" y="175" text-anchor="middle" class="det">OnLateUpdate → destroy</text>
  </g>
  <g>
    <rect x="750" y="90" width="220" height="100" rx="10" class="stepEnd"/>
    <text x="860" y="125" text-anchor="middle" class="lbl">Render</text>
    <text x="860" y="145" text-anchor="middle" class="det">clear · images · particles</text>
    <text x="860" y="160" text-anchor="middle" class="det">rects · text · pixels</text>
    <text x="860" y="175" text-anchor="middle" class="det">debug · present</text>
  </g>

  <path d="M170,140 L190,140" class="ln" marker-end="url(#a2)"/>
  <path d="M330,140 L350,140" class="ln" marker-end="url(#a2)"/>
  <path d="M510,140 L530,140" class="ln" marker-end="url(#a2)"/>
  <path d="M730,140 L750,140" class="ln" marker-end="url(#a2)"/>

  <text x="500" y="225" text-anchor="middle" class="fsub">Engine::GameLoop(int max_frames) — <tspan fill="#f1f5f9">max_frames &#8805; 0</tspan> is used by <tspan fill="#f1f5f9">--self-check</tspan> / CI</text>
</svg>
