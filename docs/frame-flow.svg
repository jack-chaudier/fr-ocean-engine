<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .bg  { fill:#0f172a; }
      .box { fill:#1e293b; stroke:#38bdf8; stroke-width:1.3; rx:10; ry:10; }
      .box-end { fill:#1e293b; stroke:#34d399; stroke-width:1.3; rx:10; ry:10; }
      .t   { fill:#f1f5f9; font-size:13px; font-weight:500; }
      .s   { fill:#94a3b8; font-size:11px; }
      .ln  { stroke:#94a3b8; stroke-width:1.3; fill:none; }
      .title { fill:#f8fafc; font-size:18px; font-weight:600; }
    </style>
  </defs>
  <rect width="960" height="220" class="bg"/>
  <text x="40" y="36" class="title">Per-frame update pipeline</text>

  <g>
    <rect x="30"  y="70" width="130" height="80" class="box"/>
    <text x="95"  y="105" text-anchor="middle" class="t">Input</text>
    <text x="95"  y="122" text-anchor="middle" class="s">BeginFrame · poll</text>
  </g>
  <g>
    <rect x="180" y="70" width="130" height="80" class="box"/>
    <text x="245" y="105" text-anchor="middle" class="t">Time</text>
    <text x="245" y="122" text-anchor="middle" class="s">dt · totalTime</text>
  </g>
  <g>
    <rect x="330" y="70" width="200" height="80" class="box"/>
    <text x="430" y="100" text-anchor="middle" class="t">Scene lifecycle</text>
    <text x="430" y="118" text-anchor="middle" class="s">OnStart → OnUpdate →</text>
    <text x="430" y="132" text-anchor="middle" class="s">physics → OnLateUpdate</text>
  </g>
  <g>
    <rect x="550" y="70" width="180" height="80" class="box"/>
    <text x="640" y="100" text-anchor="middle" class="t">Schedulers</text>
    <text x="640" y="118" text-anchor="middle" class="s">Tween · Timer · Anim</text>
    <text x="640" y="132" text-anchor="middle" class="s">Particles · Camera</text>
  </g>
  <g>
    <rect x="750" y="70" width="180" height="80" class="box-end"/>
    <text x="840" y="105" text-anchor="middle" class="t">Render</text>
    <text x="840" y="122" text-anchor="middle" class="s">sort · draw · present</text>
  </g>

  <path d="M160,110 L180,110" class="ln" marker-end="url(#a2)"/>
  <path d="M310,110 L330,110" class="ln" marker-end="url(#a2)"/>
  <path d="M530,110 L550,110" class="ln" marker-end="url(#a2)"/>
  <path d="M730,110 L750,110" class="ln" marker-end="url(#a2)"/>
</svg>
